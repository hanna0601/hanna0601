<svg xmlns="http://www.w3.org/2000/svg" width="920" height="170" viewBox="0 0 920 170" role="img" aria-labelledby="title desc">
  <title id="title">Most used languages</title>
  <desc id="desc">Language usage across Hanna Zhang's public non-fork repositories, calculated from GitHub language byte counts.</desc>
  <style>
    .title { font: 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #0969da; }
    .label { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #6e6e6e; }
  </style>

  <rect width="920" height="170" fill="#ffffff"/>
  <text x="460" y="28" text-anchor="middle" class="title">Most used languages</text>

  <g transform="translate(16 54)">
    <clipPath id="rounded-bar">
      <rect x="0" y="0" width="888" height="14" rx="7" ry="7"/>
    </clipPath>
    <g clip-path="url(#rounded-bar)">
      <rect x="0" y="0" width="644" height="14" fill="#da5b0b"/>
      <rect x="644" y="0" width="113" height="14" fill="#e34c26"/>
      <rect x="757" y="0" width="52" height="14" fill="#b07219"/>
      <rect x="809" y="0" width="39" height="14" fill="#3178c6"/>
      <rect x="848" y="0" width="24" height="14" fill="#3572a5"/>
      <rect x="872" y="0" width="6" height="14" fill="#663399"/>
      <rect x="878" y="0" width="5" height="14" fill="#3d6117"/>
      <rect x="883" y="0" width="3" height="14" fill="#f1e05a"/>
      <rect x="886" y="0" width="2" height="14" fill="#8c959f"/>
    </g>
  </g>

  <circle cx="92" cy="91" r="7" fill="#da5b0b"/>
  <text x="114" y="98" class="label">Jupyter Notebook 72.4%</text>
  <circle cx="360" cy="91" r="7" fill="#e34c26"/>
  <text x="382" y="98" class="label">HTML 12.7%</text>
  <circle cx="625" cy="91" r="7" fill="#b07219"/>
  <text x="647" y="98" class="label">Java 5.8%</text>
  <circle cx="92" cy="122" r="7" fill="#3178c6"/>
  <text x="114" y="129" class="label">TypeScript 4.4%</text>
  <circle cx="360" cy="122" r="7" fill="#3572a5"/>
  <text x="382" y="129" class="label">Python 2.7%</text>
  <circle cx="625" cy="122" r="7" fill="#663399"/>
  <text x="647" y="129" class="label">CSS 0.6%</text>
  <circle cx="92" cy="153" r="7" fill="#3d6117"/>
  <text x="114" y="160" class="label">TeX 0.6%</text>
  <circle cx="360" cy="153" r="7" fill="#f1e05a"/>
  <text x="382" y="160" class="label">JavaScript 0.4%</text>
  <circle cx="625" cy="153" r="7" fill="#8c959f"/>
  <text x="647" y="160" class="label">Other 0.2%</text>

</svg>
