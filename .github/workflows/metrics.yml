name: GitHub Metrics

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: hanna0601
          filename: github-metrics.svg
          committer_token: ${{ github.token }}

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_padding: 0, 8 + 11%

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css

          plugin_lines: yes
          plugin_lines_sections: base

          plugin_repositories: yes
          plugin_repositories_featured: hanna0601/fp-rag, hanna0601/EVOGAMI, hanna0601/othello-game-tree-search, hanna0601/ev-charging-opti

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
