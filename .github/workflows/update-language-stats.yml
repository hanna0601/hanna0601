name: Update language stats

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-language-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate language stats SVG
        env:
          LANG_STATS_TOKEN: ${{ secrets.LANG_STATS_TOKEN }}
          GITHUB_USERNAME: hanna0601
        run: python scripts/update_language_stats.py

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- language-stats.svg; then
            echo "language-stats.svg is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add language-stats.svg
          git commit -m "Update language stats"
          git push
